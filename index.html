<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GVC Real Estate · Photo Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:   #0a0a0a;
    --white:   #f5f5f3;
    --gray-1:  #1a1a1a;
    --gray-2:  #2e2e2e;
    --gray-3:  #888;
    --gray-4:  #ccc;
    --gray-5:  #e8e8e6;
    --font:    'Space Grotesk', sans-serif;
    --mono:    'Space Mono', monospace;
    --ease:    cubic-bezier(0.16, 1, 0.3, 1);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font);
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── SHARED NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 40px;
    background: rgba(10,10,10,0.72);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .nav-logo {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
    cursor: pointer;
  }

  .nav-back {
    display: none;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--gray-3);
    cursor: pointer;
    transition: color 0.2s;
    background: none; border: none;
  }
  .nav-back:hover { color: var(--white); }
  .nav-back svg { width: 16px; height: 16px; }

  /* ─── PAGE SYSTEM ─── */
  .page { display: none; }
  .page.active { display: block; }

  /* ══════════════════════════════════
     HOME PAGE
  ══════════════════════════════════ */
  #page-home {
    min-height: 100vh;
  }

  /* Hero with parallax */
  .hero {
    position: relative;
    height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
    text-align: center;
  }

  .hero-bg {
    position: absolute; inset: 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 0;
    will-change: transform;
  }

  .hero-tile {
    overflow: hidden;
    position: relative;
  }

  .hero-tile img {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: brightness(0.22) saturate(0.3);
    transform: scale(1.15);
    transition: transform 0.1s linear;
    will-change: transform;
  }

  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(10,10,10,0.3) 0%,
      rgba(10,10,10,0.5) 50%,
      rgba(10,10,10,0.85) 100%
    );
  }

  .hero-content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
    gap: 16px;
  }

  .hero-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gray-3);
  }

  .hero-title {
    font-size: clamp(38px, 6vw, 72px);
    font-weight: 300;
    line-height: 1.08;
    letter-spacing: -0.02em;
  }

  .hero-title strong { font-weight: 600; }

  .hero-sub {
    font-size: 15px;
    color: var(--gray-3);
    margin-top: 4px;
  }

  .hero-scroll {
    position: absolute; bottom: 36px; left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    display: flex; flex-direction: column; align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gray-3);
    animation: scrollBob 2.4s ease-in-out infinite;
  }

  .hero-scroll-line {
    width: 1px; height: 40px;
    background: linear-gradient(to bottom, var(--gray-3), transparent);
  }

  @keyframes scrollBob {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%       { transform: translateX(-50%) translateY(6px); }
  }

  /* Property grid */
  .properties-section {
    padding: 80px 40px 100px;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray-3);
    margin-bottom: 40px;
  }

  .properties-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 2px;
  }

  .property-card {
    position: relative;
    aspect-ratio: 4/3;
    overflow: hidden;
    cursor: pointer;
    background: var(--gray-1);
  }

  .property-card img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.7s var(--ease), filter 0.4s;
    filter: brightness(0.75) saturate(0.6);
    transform: scale(1.03);
  }

  .property-card:hover img {
    transform: scale(1.08);
    filter: brightness(0.6) saturate(0.4);
  }

  .property-card-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(10,10,10,0.85) 0%, transparent 55%);
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 28px;
    transition: background 0.4s;
  }

  .property-card:hover .property-card-overlay {
    background: linear-gradient(to top, rgba(10,10,10,0.92) 0%, rgba(10,10,10,0.2) 55%);
  }

  .property-name {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  .property-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--gray-3);
    margin-top: 6px;
    letter-spacing: 0.06em;
  }

  .property-arrow {
    position: absolute; top: 24px; right: 24px;
    width: 36px; height: 36px;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.3s, transform 0.3s var(--ease), border-color 0.2s;
  }

  .property-card:hover .property-arrow {
    opacity: 1;
    transform: scale(1);
  }

  .property-arrow svg { width: 14px; height: 14px; color: var(--white); }

  /* Placeholder card (no cover image) */
  .property-card.no-cover {
    background: var(--gray-1);
    display: flex; align-items: center; justify-content: center;
  }
  .property-card.no-cover::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 8px,
      rgba(255,255,255,0.02) 8px,
      rgba(255,255,255,0.02) 16px
    );
  }

  /* Loading skeleton */
  .skeleton-card {
    aspect-ratio: 4/3;
    background: var(--gray-1);
    position: relative; overflow: hidden;
  }
  .skeleton-card::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
    animation: shimmer 1.6s infinite;
  }
  @keyframes shimmer {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* ══════════════════════════════════
     GALLERY PAGE
  ══════════════════════════════════ */
  #page-gallery {
    min-height: 100vh;
    padding-top: 80px;
  }

  .gallery-header {
    padding: 48px 40px 32px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .gallery-property-name {
    font-size: clamp(24px, 4vw, 42px);
    font-weight: 300;
    letter-spacing: -0.02em;
  }

  .gallery-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--gray-3);
    letter-spacing: 0.1em;
    margin-top: 6px;
  }

  .gallery-controls {
    display: flex; align-items: center; gap: 16px;
    padding-bottom: 4px;
  }

  /* Global toggle: show all raw / all edited */
  .view-toggle {
    display: flex;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 40px;
    overflow: hidden;
    background: var(--gray-1);
  }

  .view-toggle button {
    padding: 8px 20px;
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: none;
    border: none;
    color: var(--gray-3);
    cursor: pointer;
    transition: background 0.25s, color 0.25s;
  }

  .view-toggle button.active {
    background: var(--white);
    color: var(--black);
    border-radius: 40px;
  }

  /* Gallery grid */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 2px;
    padding: 2px;
  }

  .photo-card {
    position: relative;
    aspect-ratio: 4/3;
    overflow: hidden;
    cursor: pointer;
    background: var(--gray-1);
    group: true;
  }

  .photo-card img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.6s var(--ease), opacity 0.35s;
  }

  .photo-card img.raw-img  { z-index: 1; }
  .photo-card img.edit-img { z-index: 2; }

  /* When showing raw, edited fades out */
  .photo-card.show-raw img.edit-img { opacity: 0; }
  .photo-card.show-raw img.raw-img  { opacity: 1; }
  .photo-card img.edit-img { opacity: 1; }
  .photo-card img.raw-img  { opacity: 0; }

  .photo-card:hover img { transform: scale(1.04); }

  /* Badge */
  .photo-badge {
    position: absolute; top: 12px; left: 12px; z-index: 10;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(10,10,10,0.55);
    backdrop-filter: blur(6px);
    color: var(--white);
    pointer-events: none;
    transition: opacity 0.2s;
  }

  /* Per-photo toggle button */
  .photo-toggle {
    position: absolute; bottom: 12px; right: 12px; z-index: 10;
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(10,10,10,0.6);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    opacity: 0;
    transform: scale(0.85) translateY(4px);
    transition: opacity 0.25s, transform 0.25s var(--ease), background 0.2s;
  }

  .photo-card:hover .photo-toggle {
    opacity: 1;
    transform: scale(1) translateY(0);
  }

  .photo-toggle:hover {
    background: rgba(245,245,243,0.15);
  }

  .photo-toggle svg { width: 14px; height: 14px; color: var(--white); }

  /* Photo label */
  .photo-label {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 9;
    padding: 32px 14px 14px;
    background: linear-gradient(to top, rgba(10,10,10,0.8) 0%, transparent 100%);
    font-size: 12px;
    color: rgba(245,245,243,0.65);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    text-transform: capitalize;
  }

  .photo-card:hover .photo-label { opacity: 1; }

  /* Only-one-version indicator */
  .photo-card.only-edited .photo-toggle,
  .photo-card.only-raw .photo-toggle {
    display: none;
  }

  /* ─── LIGHTBOX ─── */
  .lightbox {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(5,5,5,0.95);
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  .lightbox.open { display: flex; }

  .lightbox-img-wrap {
    position: relative;
    max-width: 90vw;
    max-height: 80vh;
  }

  .lightbox-img-wrap img {
    max-width: 90vw;
    max-height: 80vh;
    object-fit: contain;
    display: block;
  }

  .lightbox-controls {
    display: flex; align-items: center; gap: 24px;
  }

  .lb-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
  }
  .lb-btn:hover { background: rgba(255,255,255,0.12); }
  .lb-btn svg { width: 16px; height: 16px; color: var(--white); }

  .lb-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--gray-3);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 80vw;
  }

  .lightbox-close {
    position: absolute; top: 24px; right: 24px;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--gray-3);
    transition: color 0.2s, background 0.2s;
    z-index: 10;
  }
  .lightbox-close:hover { color: var(--white); background: rgba(255,255,255,0.06); }
  .lightbox-close svg { width: 18px; height: 18px; }

  .lb-toggle-pill {
    display: flex;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 40px;
    overflow: hidden;
    background: rgba(255,255,255,0.04);
  }
  .lb-toggle-pill button {
    padding: 7px 18px;
    font-family: var(--font);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: none; border: none;
    color: var(--gray-3);
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .lb-toggle-pill button.active {
    background: var(--white);
    color: var(--black);
    border-radius: 40px;
  }

  /* Keyboard hint strip */
  .lb-hints {
    display: flex;
    gap: 20px;
    align-items: center;
    justify-content: center;
    margin-top: 4px;
  }
  .lb-hint {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--gray-3);
    letter-spacing: 0.06em;
  }
  .lb-key {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 22px;
    height: 18px;
    padding: 0 5px;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    font-size: 9px;
    color: var(--gray-4);
    letter-spacing: 0;
  }

  /* ─── PROPERTY SWITCHER DROPDOWN ─── */
  .prop-switcher {
    position: relative;
  }

  .prop-switcher-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--gray-1);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 40px;
    color: var(--gray-3);
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  .prop-switcher-btn:hover { color: var(--white); border-color: rgba(255,255,255,0.22); }
  .prop-switcher-btn svg { width: 12px; height: 12px; transition: transform 0.2s; }
  .prop-switcher.open .prop-switcher-btn svg { transform: rotate(180deg); }

  .prop-switcher-menu {
    display: none;
    position: absolute; top: calc(100% + 8px); right: 0;
    min-width: 220px;
    background: var(--gray-1);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    overflow: hidden;
    z-index: 200;
    box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  }
  .prop-switcher.open .prop-switcher-menu { display: block; }

  .prop-switcher-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    gap: 12px;
  }
  .prop-switcher-item:last-child { border-bottom: none; }
  .prop-switcher-item:hover { background: rgba(255,255,255,0.05); }
  .prop-switcher-item.current { color: var(--white); }
  .prop-switcher-item .item-name { flex: 1; }
  .prop-switcher-item .item-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--gray-3);
    letter-spacing: 0.06em;
  }
  .prop-switcher-item .item-check {
    width: 16px; height: 16px;
    opacity: 0;
  }
  .prop-switcher-item.current .item-check { opacity: 1; }

  /* ─── FOOTER ─── */
  .site-footer {
    padding: 40px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 80px;
  }

  .footer-copy {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--gray-3);
    text-transform: uppercase;
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 640px) {
    nav { padding: 16px 20px; }
    .properties-section { padding: 48px 0 60px; }
    .section-label { padding: 0 20px; }
    .hero-title { font-size: 32px; }
    .gallery-header { padding: 32px 20px 24px; }
    .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    .properties-grid { grid-template-columns: 1fr; gap: 2px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <span class="nav-logo" id="nav-logo" onclick="showHome()" style="cursor:pointer;">Photo Review</span>
  <button class="nav-back" id="nav-back" onclick="showHome()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    All Properties
  </button>
</nav>

<!-- ══ HOME PAGE ══ -->
<div id="page-home" class="page active">

  <section class="hero" id="hero">
    <div class="hero-bg" id="hero-bg">
      <!-- tiles injected by JS -->
    </div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <p class="hero-eyebrow">GVC Real Estate Team</p>
      <h1 class="hero-title">Before &amp; After<br/><strong>Photo Review</strong></h1>
      <p class="hero-sub">Select a property to compare raw &amp; edited photography</p>
    </div>
    <div class="hero-scroll">
      <div class="hero-scroll-line"></div>
      scroll
    </div>
  </section>

  <section class="properties-section">
    <p class="section-label">Properties — <span id="prop-count">—</span></p>
    <div class="properties-grid" id="properties-grid">
      <!-- skeleton placeholders -->
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>
  </section>

  <footer class="site-footer">
    <span class="footer-copy">&copy; <span id="footer-year"></span> GVC Real Estate Team</span>
    <span class="footer-copy">Matthew Bloomfield</span>
  </footer>

</div>

<!-- ══ GALLERY PAGE ══ -->
<div id="page-gallery" class="page">

  <div class="gallery-header">
    <div>
      <h2 class="gallery-property-name" id="gallery-title">Property</h2>
      <p class="gallery-count" id="gallery-count"></p>
    </div>
    <div class="gallery-controls">
      <!-- Property switcher -->
      <div class="prop-switcher" id="prop-switcher">
        <button class="prop-switcher-btn" onclick="toggleSwitcher()">
          <span id="switcher-label">Property</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="prop-switcher-menu" id="prop-switcher-menu">
          <!-- populated by JS -->
        </div>
      </div>
      <!-- Edited / Raw toggle -->
      <div class="view-toggle" id="view-toggle">
        <button class="active" data-mode="edited" onclick="setGlobalMode('edited')">Edited</button>
        <button data-mode="raw" onclick="setGlobalMode('raw')">Raw</button>
      </div>
    </div>
  </div>

  <div class="gallery-grid" id="gallery-grid"></div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
  <div class="lightbox-img-wrap">
    <img id="lb-img" src="" alt=""/>
  </div>
  <div class="lb-label" id="lb-label"></div>
  <div class="lightbox-controls">
    <button class="lb-btn" onclick="lbNav(-1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <div class="lb-toggle-pill" id="lb-toggle-pill">
      <button id="lb-btn-edited" class="active" onclick="lbSetMode('edited')">Edited</button>
      <button id="lb-btn-raw" onclick="lbSetMode('raw')">Raw</button>
    </div>
    <button class="lb-btn" onclick="lbNav(1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 6 15 12 9 18"/>
      </svg>
    </button>
  </div>
  <div class="lb-hints">
    <span class="lb-hint"><span class="lb-key">←</span><span class="lb-key">→</span> navigate</span>
    <span class="lb-hint"><span class="lb-key">space</span> raw / edited</span>
    <span class="lb-hint"><span class="lb-key">esc</span> close</span>
  </div>
</div>

<script>
// ─── STATE ───
let allProperties = [];
let currentProperty = null;
let globalMode = 'edited'; // 'edited' | 'raw'
let lbIndex = 0;
let lbMode = 'edited';

// ─── INIT ───
document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('footer-year').textContent = new Date().getFullYear();
  await loadProperties();
  initParallax();
  window.addEventListener('keydown', handleKey);
  document.addEventListener('click', (e) => {
    const switcher = document.getElementById('prop-switcher');
    if (switcher && !switcher.contains(e.target)) closeSwitcher();
  });
});

async function loadProperties() {
  try {
    // Try live server first (local dev), fall back to static JSON (GitHub Pages)
    let res = await fetch('/api/properties');
    if (!res.ok) throw new Error('no api');
    allProperties = await res.json();
  } catch {
    try {
      const res = await fetch('./properties.json');
      if (!res.ok) throw new Error('no json');
      allProperties = await res.json();
    } catch (e) {
      document.getElementById('properties-grid').innerHTML =
        `<p style="color:var(--gray-3);font-size:13px;padding:20px">
          Could not load properties. Run <code>generate.py</code> or <code>server.py</code>.
         </p>`;
      return;
    }
  }
  renderPropertyGrid();
  renderHeroBg();
  document.getElementById('prop-count').textContent = allProperties.length;
}

function renderPropertyGrid() {
  const grid = document.getElementById('properties-grid');
  if (!allProperties.length) {
    grid.innerHTML = `<p style="color:var(--gray-3);font-size:13px;padding:20px">No properties found.</p>`;
    return;
  }
  grid.innerHTML = allProperties.map(p => {
    if (p.cover) {
      return `
        <div class="property-card" onclick="openProperty('${p.id}')">
          <img src="${p.cover}" alt="${p.name}" loading="lazy"/>
          <div class="property-card-overlay">
            <div class="property-name">${p.name}</div>
            <div class="property-meta">${p.count} photo${p.count !== 1 ? 's' : ''}</div>
          </div>
          <div class="property-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
          </div>
        </div>`;
    } else {
      return `
        <div class="property-card no-cover" onclick="openProperty('${p.id}')">
          <div class="property-card-overlay">
            <div class="property-name">${p.name}</div>
            <div class="property-meta">${p.count} photo${p.count !== 1 ? 's' : ''}</div>
          </div>
        </div>`;
    }
  }).join('');
}

function renderHeroBg() {
  // Collect all edited covers + a few more photos for hero bg tiles
  const imgs = [];
  for (const p of allProperties) {
    for (const ph of p.photos.slice(0, 4)) {
      if (ph.edited) imgs.push(ph.edited);
      if (imgs.length >= 9) break;
    }
    if (imgs.length >= 9) break;
  }
  // Pad if needed
  while (imgs.length < 6) imgs.push('');
  const bg = document.getElementById('hero-bg');
  bg.innerHTML = imgs.slice(0, 6).map(src => `
    <div class="hero-tile">
      ${src ? `<img src="${src}" alt="" loading="eager"/>` : ''}
    </div>
  `).join('');
}

// ─── PARALLAX ───
function initParallax() {
  const hero = document.getElementById('hero');
  const bg = document.getElementById('hero-bg');
  if (!hero || !bg) return;

  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        const scrollY = window.scrollY;
        const h = hero.offsetHeight;
        if (scrollY <= h) {
          const pct = scrollY / h; // 0 → 1 as we scroll through hero
          const imgs = bg.querySelectorAll('img');
          imgs.forEach((img, i) => {
            // Alternate direction per tile for depth effect
            const dir = (i % 2 === 0) ? 1 : -1;
            const speed = 0.08 + (i % 3) * 0.04;
            const offsetY = scrollY * speed * dir;
            img.style.transform = `scale(1.15) translateY(${offsetY}px)`;
          });
        }
        ticking = false;
      });
      ticking = true;
    }
  });
}

// ─── NAVIGATION ───
function showHome() {
  document.getElementById('page-home').classList.add('active');
  document.getElementById('page-gallery').classList.remove('active');
  document.getElementById('nav-back').style.display = 'none';
  window.scrollTo(0, 0);
  currentProperty = null;
}

function openProperty(id) {
  currentProperty = allProperties.find(p => p.id === id);
  if (!currentProperty) return;
  globalMode = 'edited';
  setGlobalModeUI('edited');

  document.getElementById('gallery-title').textContent = currentProperty.name;
  document.getElementById('gallery-count').textContent = `${currentProperty.count} photo${currentProperty.count !== 1 ? 's' : ''}`;
  document.getElementById('switcher-label').textContent = currentProperty.name;

  renderGallery();
  renderSwitcherMenu();

  document.getElementById('page-home').classList.remove('active');
  document.getElementById('page-gallery').classList.add('active');
  document.getElementById('nav-back').style.display = 'flex';
  window.scrollTo(0, 0);
}

// ─── PROPERTY SWITCHER ───
function toggleSwitcher() {
  document.getElementById('prop-switcher').classList.toggle('open');
}

function closeSwitcher() {
  document.getElementById('prop-switcher').classList.remove('open');
}

function renderSwitcherMenu() {
  const menu = document.getElementById('prop-switcher-menu');
  menu.innerHTML = allProperties.map(p => `
    <div class="prop-switcher-item ${p.id === currentProperty.id ? 'current' : ''}"
         onclick="switchProperty('${p.id}')">
      <span class="item-name">${p.name}</span>
      <span class="item-count">${p.count} photos</span>
      <svg class="item-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
  `).join('');
}

function switchProperty(id) {
  closeSwitcher();
  if (id === currentProperty?.id) return;
  openProperty(id);
}

// ─── GALLERY ───
function renderGallery() {
  const grid = document.getElementById('gallery-grid');
  const photos = currentProperty.photos;

  grid.innerHTML = photos.map((ph, i) => {
    const hasRaw = !!ph.raw;
    const hasEdited = !!ph.edited;
    const onlyEdited = hasEdited && !hasRaw;
    const onlyRaw = hasRaw && !hasEdited;
    const classExtra = onlyEdited ? ' only-edited' : onlyRaw ? ' only-raw' : '';

    const displayLabel = ph.label
      .replace(/[-_]/g, ' ')
      .replace(/\b\w/g, c => c.toUpperCase());

    return `
      <div class="photo-card${classExtra}" id="pc-${i}" onclick="openLightbox(${i})">
        ${ph.raw    ? `<img class="raw-img"  src="${ph.raw}"    alt="${displayLabel} raw"    loading="lazy"/>` : ''}
        ${ph.edited ? `<img class="edit-img" src="${ph.edited}" alt="${displayLabel} edited" loading="lazy"/>` : ''}
        <div class="photo-badge" id="badge-${i}">${hasEdited && !onlyRaw ? 'Edited' : 'Raw'}</div>
        <div class="photo-label">${displayLabel}</div>
        ${(!onlyEdited && !onlyRaw) ? `
        <button class="photo-toggle" title="Toggle version" onclick="togglePhoto(event, ${i})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
            <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
        </button>` : ''}
      </div>`;
  }).join('');
}

function togglePhoto(e, idx) {
  e.stopPropagation();
  const card = document.getElementById(`pc-${idx}`);
  const badge = document.getElementById(`badge-${idx}`);
  const isRaw = card.classList.contains('show-raw');
  if (isRaw) {
    card.classList.remove('show-raw');
    badge.textContent = 'Edited';
  } else {
    card.classList.add('show-raw');
    badge.textContent = 'Raw';
  }
}

function setGlobalMode(mode) {
  globalMode = mode;
  setGlobalModeUI(mode);
  const cards = document.querySelectorAll('.photo-card');
  cards.forEach((card, i) => {
    const ph = currentProperty.photos[i];
    const badge = document.getElementById(`badge-${i}`);
    if (!badge) return;
    if (mode === 'raw') {
      if (ph.raw) { card.classList.add('show-raw'); badge.textContent = 'Raw'; }
    } else {
      card.classList.remove('show-raw');
      badge.textContent = ph.edited ? 'Edited' : 'Raw';
    }
  });
}

function setGlobalModeUI(mode) {
  document.querySelectorAll('#view-toggle button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
}

// ─── LIGHTBOX ───
function openLightbox(idx) {
  lbIndex = idx;
  const ph = currentProperty.photos[idx];
  lbMode = ph.edited ? 'edited' : 'raw';
  const card = document.getElementById(`pc-${idx}`);
  if (card && card.classList.contains('show-raw') && ph.raw) lbMode = 'raw';
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox') && !e.currentTarget.classList?.contains('lightbox-close')) return;
  document.getElementById('lightbox').classList.remove('open');
}

function lbNav(dir) {
  const n = currentProperty.photos.length;
  lbIndex = (lbIndex + dir + n) % n;
  const ph = currentProperty.photos[lbIndex];
  lbMode = ph.edited ? 'edited' : 'raw';
  updateLightbox();
}

function lbSetMode(mode) {
  const ph = currentProperty.photos[lbIndex];
  if (mode === 'raw' && !ph.raw) return;
  if (mode === 'edited' && !ph.edited) return;
  lbMode = mode;
  updateLightbox();
}

function updateLightbox() {
  const ph = currentProperty.photos[lbIndex];
  const src = lbMode === 'raw' ? (ph.raw || ph.edited) : (ph.edited || ph.raw);
  document.getElementById('lb-img').src = src;
  const label = ph.label.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  document.getElementById('lb-label').textContent = `${label} · ${lbIndex + 1} / ${currentProperty.photos.length}`;
  document.getElementById('lb-btn-edited').classList.toggle('active', lbMode === 'edited');
  document.getElementById('lb-btn-raw').classList.toggle('active', lbMode === 'raw');
  // Disable buttons if only one version
  document.getElementById('lb-btn-raw').style.opacity = ph.raw ? '1' : '0.3';
  document.getElementById('lb-btn-edited').style.opacity = ph.edited ? '1' : '0.3';
}

function handleKey(e) {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'ArrowRight') { e.preventDefault(); lbNav(1); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); lbNav(-1); }
  if (e.key === 'Escape')     lb.classList.remove('open');
  if (e.key === ' ' || e.key === 'Spacebar') {
    e.preventDefault();
    lbSetMode(lbMode === 'raw' ? 'edited' : 'raw');
  }
  if (e.key === 'r' || e.key === 'R') lbSetMode(lbMode === 'raw' ? 'edited' : 'raw');
}
</script>

</body>
</html>
