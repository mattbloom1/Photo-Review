<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Real Estate Photo Editing — Portfolio, Matt Bloomfield</title>
<meta name="description" content="Matt Bloomfield — Graphic Design Assistant. A collection of edited real estate photography."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#f4efe6;
  --paper-2:#ece6d9;
  --ink:#111111;
  --ink-2:#2a2926;
  --muted:#6b665c;
  --rule:#d7d1c3;
  --accent:#7a2e1f;
  --serif:'Fraunces',Georgia,serif;
  --sans:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --ease:cubic-bezier(0.2,0.8,0.2,1);
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans);
  background:var(--paper);
  color:var(--ink);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

.masthead{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:baseline;justify-content:space-between;gap:12px;
  padding:18px 40px;
  background:var(--paper);
  border-bottom:1px solid var(--rule);
}
.mast-left{font-family:var(--serif);font-size:17px;font-weight:400;letter-spacing:-0.01em}
.mast-left em{font-style:italic;font-weight:300;color:var(--muted)}
.mast-right{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;display:flex;align-items:baseline;gap:18px;flex-shrink:0}
.mast-right a{border-bottom:1px solid transparent;padding-bottom:2px;transition:border-color .2s}
.mast-right a:hover{border-color:var(--ink)}

footer.site-foot{
  margin-top:120px;padding:36px 40px 28px;
  border-top:1px solid var(--rule);
  display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:12px;
  font-family:var(--mono);font-size:11px;color:var(--muted);
  letter-spacing:0.06em;text-transform:uppercase;
}
footer.site-foot .sig{font-family:var(--serif);font-style:italic;text-transform:none;letter-spacing:0;font-size:14px;color:var(--ink-2)}

@media (max-width:640px){
  .masthead{padding:12px 16px;gap:8px}
  .mast-left{font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mast-left em{display:none}
  .mast-right{font-size:10px;gap:12px}
  .mast-right .portfolio-tag{display:none}
  footer.site-foot{padding:24px 16px 18px;margin-top:56px;font-size:10px;gap:8px}
  footer.site-foot .sig{font-size:12px}
}

@media (hover:none){
  .mast-right a:hover{border-color:transparent}
}

.hero{
  padding:90px 40px 56px;
  border-bottom:1px solid var(--rule);
  display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:end;
}
.hero h1{
  font-family:var(--serif);
  font-weight:300;
  font-size:clamp(56px,9vw,132px);
  line-height:0.92;
  letter-spacing:-0.035em;
  color:var(--ink);
}
.hero h1 em{font-style:italic;font-weight:300;color:var(--ink-2)}
.hero-meta{display:flex;flex-direction:column;gap:18px;padding-bottom:18px}
.hero-meta .lede{
  font-family:var(--serif);font-style:italic;font-weight:300;
  font-size:clamp(18px,1.5vw,22px);line-height:1.45;color:var(--ink-2);max-width:52ch;
}
.hero-meta .tag{
  display:inline-flex;align-items:center;gap:10px;
  font-family:var(--mono);font-size:11px;color:var(--muted);
  letter-spacing:0.14em;text-transform:uppercase;
}
.hero-meta .tag::before{content:"";width:28px;height:1px;background:var(--muted)}

.index-band{
  padding:28px 40px;
  display:flex;align-items:baseline;justify-content:space-between;gap:24px;
  border-bottom:1px solid var(--rule);
}
.index-band h2{font-family:var(--serif);font-weight:400;font-style:italic;font-size:22px;letter-spacing:-0.01em;color:var(--ink-2)}
.index-band .count{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.14em;text-transform:uppercase}

.props{padding:0 40px}
.prop-row{
  display:grid;
  grid-template-columns:56px 1fr auto 220px;
  gap:32px;align-items:center;
  padding:26px 0;
  border-bottom:1px solid var(--rule);
  transition:background-color .35s var(--ease);
  position:relative;cursor:pointer;
}
.prop-row:hover{background:rgba(122,46,31,0.04)}
.prop-row .num{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.08em}
.prop-row .name{
  font-family:var(--serif);font-weight:400;
  font-size:clamp(26px,3.2vw,40px);line-height:1.05;
  letter-spacing:-0.02em;color:var(--ink);transition:color .25s;
}
.prop-row:hover .name{color:var(--accent)}
.prop-row .meta{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap}
.prop-row .thumb{width:220px;aspect-ratio:4/3;overflow:hidden;background:var(--paper-2);border:1px solid var(--rule);position:relative}
.prop-row .thumb img{
  width:100%;height:100%;object-fit:cover;transform:scale(1.02);
  transition:transform .8s var(--ease),filter .4s;
  filter:saturate(0.95) contrast(1.02);
}
.prop-row:hover .thumb img{transform:scale(1.08)}
.prop-row .arrow{
  position:absolute;right:-6px;top:50%;transform:translateY(-50%);
  font-family:var(--serif);font-size:28px;font-style:italic;color:var(--muted);
  opacity:0;transition:opacity .3s,transform .35s var(--ease);pointer-events:none;
}
.prop-row:hover .arrow{opacity:1;transform:translateY(-50%) translateX(10px);color:var(--accent)}

.colophon{
  display:grid;grid-template-columns:repeat(3,1fr);gap:40px;
  padding:80px 40px 40px;border-top:1px solid var(--rule);margin-top:64px;
}
.col-block h4{
  font-family:var(--mono);font-size:11px;color:var(--muted);
  letter-spacing:0.14em;text-transform:uppercase;margin-bottom:12px;font-weight:500;
}
.col-block p{
  font-family:var(--serif);font-weight:300;font-size:17px;line-height:1.55;color:var(--ink-2);max-width:36ch;
}
.col-block p em{font-style:italic;color:var(--accent)}

@media (max-width:900px){
  .hero{grid-template-columns:1fr;gap:32px;padding:56px 24px 40px}
  .prop-row{grid-template-columns:40px 1fr auto;gap:16px;padding:20px 0}
  .prop-row .thumb{display:none}
  .colophon{grid-template-columns:1fr;gap:28px;padding:56px 24px 24px}
  .index-band{padding:20px 24px}
  .props{padding:0 24px}
}

@media (max-width:640px){
  .hero{padding:40px 16px 32px;gap:24px}
  .hero h1{font-size:clamp(44px,13vw,80px);line-height:0.94}
  .hero-meta{gap:14px;padding-bottom:0}
  .hero-meta .lede{font-size:16px;line-height:1.5}
  .hero-meta .tag{font-size:10px}

  .index-band{padding:18px 16px;gap:12px}
  .index-band h2{font-size:18px}
  .index-band .count{font-size:10px}

  .props{padding:0 16px}
  .prop-row{
    display:block;
    padding:0;margin-bottom:20px;
    border-bottom:0;
    background:var(--paper-2);
    border:1px solid var(--rule);
    border-radius:4px;
    overflow:hidden;
    transition:transform .25s var(--ease),border-color .25s;
  }
  .prop-row:hover{background:var(--paper-2)}
  .prop-row:active{transform:scale(0.985);border-color:var(--ink)}
  .prop-row .thumb{
    display:block !important;
    width:100%;
    aspect-ratio:3/2;
    border:0;
    border-bottom:1px solid var(--rule);
  }
  .prop-row .thumb img{transform:none}
  .prop-row .num{
    display:inline-block;
    padding:14px 14px 0;
    font-size:10px;
  }
  .prop-row .name{
    display:block;
    padding:4px 14px 2px;
    font-size:26px;
    line-height:1.1;
  }
  .prop-row .meta{
    display:block;
    padding:0 14px 14px;
    font-size:10px;
  }
  .prop-row .arrow{display:none}

  .colophon{padding:48px 16px 24px;gap:24px;margin-top:40px}
  .col-block h4{font-size:10px;margin-bottom:8px}
  .col-block p{font-size:15px;line-height:1.5}
}

</style>
</head>
<body>
<script>window.__PROPS__ = [{"slug": "152-9th-avenue-apt-2", "name": "152 9th Avenue Apt. 2", "cover": "./152%209th%20Avenue%20Apt.%202/Edited/Bathroom-Edit.jpg", "count": 19}, {"slug": "200-e-57th-7a", "name": "200 E 57th 7A", "cover": "./200%20E%2057th%207A/Edited/bathroom%20.jpg", "count": 17}, {"slug": "207-mckinley", "name": "207 Mckinley", "cover": "./207%20Mckinley/Edited/Bedrooms.jpg", "count": 43}, {"slug": "345-east-45th-c", "name": "345 East 45th C", "cover": "./345%20East%2045th%20C/Edited/Bathroom.jpg", "count": 8}, {"slug": "400-5th-ave-32c", "name": "400 5th Ave 32C", "cover": "./400%205th%20Ave%2032C/Edited/Bathroom-Edit.jpg", "count": 12}, {"slug": "404-park-ave-south-6a", "name": "404 Park Ave South 6A", "cover": "./404%20Park%20Ave%20South%206A/Edited/Photo-18.jpg", "count": 4}, {"slug": "929-park", "name": "929 Park", "cover": "./929%20Park/Edited/Bathroom%201_.jpg", "count": 16}, {"slug": "le-reve", "name": "Le Reve", "cover": "./Le%20Reve/Edited/Photo-1.jpg", "count": 77}];</script>
<header class="masthead">
  <div class="mast-left">Matt Bloomfield <em>— Graphic Design Assistant</em></div>
  <div class="mast-right">
    <a href="mailto:matthew@gvcrealestateteam.com">Contact</a>
  </div>
</header>

<section class="hero">
  <h1>Real&nbsp;Estate<br/><em>Photo&nbsp;Editing</em></h1>
  <div class="hero-meta">
    <p class="lede">Listings from <em><a href="https://gvcrealestateteam.com/" target="_blank" rel="noopener">GVC Real Estate Team</a></em></p>
  </div>
</section>

<section class="index-band">
  <h2>Index of properties</h2>
  <span class="count" id="prop-count">—</span>
</section>

<div class="props" id="props"></div>

<section class="colophon">
  <div class="col-block">
    <h4>Credits</h4>
    <p>Properties listed by <em><a href="https://gvcrealestateteam.com/" target="_blank" rel="noopener">GVC Real Estate Team</a></em>. Edits by Matt Bloomfield.</p>
  </div>
  <div class="col-block">
    <h4>Contact</h4>
    <p><em>matthew@gvcrealestateteam.com</em></p>
  </div>
</section>

<footer class="site-foot">
  <span>© <span id="year"></span> — Matt Bloomfield</span>
  <span class="sig">Compiled by hand.</span>
</footer>

<script>
const PROPS = window.__PROPS__ || [];
document.getElementById("year").textContent = new Date().getFullYear();
document.getElementById("prop-count").textContent =
  String(PROPS.length).padStart(2,"0") + " / " +
  PROPS.reduce((s,p)=>s+p.count,0) + " photos";

const wrap = document.getElementById("props");
wrap.innerHTML = PROPS.map((p,i) => `
  <a class="prop-row" href="./${p.slug}/">
    <span class="num">${String(i+1).padStart(2,"0")}</span>
    <span class="name">${p.name}</span>
    <span class="meta">${p.count} photo${p.count===1?"":"s"}</span>
    <span class="thumb">${p.cover ? `<img src="${p.cover}" alt="" loading="lazy"/>` : ""}</span>
    <span class="arrow">→</span>
  </a>
`).join("");
</script>

</body>
</html>
