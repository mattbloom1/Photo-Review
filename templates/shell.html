<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>{{TITLE}}</title>
<meta name="description" content="Matt Bloomfield — Graphic Design Assistant. A collection of edited real estate photography."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#f4efe6;
  --paper-2:#ece6d9;
  --ink:#111111;
  --ink-2:#2a2926;
  --muted:#6b665c;
  --rule:#d7d1c3;
  --accent:#7a2e1f;
  --serif:'Fraunces',Georgia,serif;
  --sans:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --ease:cubic-bezier(0.2,0.8,0.2,1);
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans);
  background:var(--paper);
  color:var(--ink);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

.masthead{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:baseline;justify-content:space-between;gap:12px;
  padding:18px 40px;
  background:var(--paper);
  border-bottom:1px solid var(--rule);
}
.mast-left{font-family:var(--serif);font-size:17px;font-weight:400;letter-spacing:-0.01em}
.mast-left em{font-style:italic;font-weight:300;color:var(--muted)}
.mast-right{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;display:flex;align-items:baseline;gap:18px;flex-shrink:0}
.mast-right a{border-bottom:1px solid transparent;padding-bottom:2px;transition:border-color .2s}
.mast-right a:hover{border-color:var(--ink)}

footer.site-foot{
  margin-top:120px;padding:36px 40px 28px;
  border-top:1px solid var(--rule);
  display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:12px;
  font-family:var(--mono);font-size:11px;color:var(--muted);
  letter-spacing:0.06em;text-transform:uppercase;
}
footer.site-foot .sig{font-family:var(--serif);font-style:italic;text-transform:none;letter-spacing:0;font-size:14px;color:var(--ink-2)}

@media (max-width:640px){
  .masthead{padding:12px 16px;gap:8px}
  .mast-left{font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mast-left em{display:none}
  .mast-right{font-size:10px;gap:12px}
  .mast-right .portfolio-tag{display:none}
  footer.site-foot{padding:24px 16px 18px;margin-top:56px;font-size:10px;gap:8px}
  footer.site-foot .sig{font-size:12px}
}

@media (hover:none){
  .mast-right a:hover{border-color:transparent}
}

{{EXTRA_CSS}}
</style>
</head>
<body>
{{DATA_SCRIPT}}
{{BODY}}
</body>
</html>
